# Example local runtime for future DataOps / MLOps portfolio projects.
# Public documentation only: do not add real secrets or expose services publicly.

services:
  postgres:
    image: postgres:16
    container_name: dataops-postgres
    environment:
      POSTGRES_USER: dataops
      POSTGRES_PASSWORD: change_me_locally
      POSTGRES_DB: banking_lab
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataops -d banking_lab"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    container_name: mlflow-local
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - mlflow_data:/mlflow

  streamlit:
    image: python:3.12-slim
    container_name: streamlit-placeholder
    working_dir: /app
    command: bash -lc "echo 'Mount a Streamlit app here for banking-dataops-monitoring' && sleep infinity"
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - ../:/app:ro

volumes:
  postgres_data:
  mlflow_data:
